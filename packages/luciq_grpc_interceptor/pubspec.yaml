name: luciq_grpc_interceptor
description:
  This package is an add on to luciq_flutter. It intercepts any gRPC calls
  performed with the grpc package and sends them to the report that will be
  sent to the dashboard.
version: 1.0.0
homepage: https://github.com/luciqai/luciq-flutter-sdk#readme
repository: https://github.com/luciqai/luciq-flutter-sdk/tree/master/packages/luciq_grpc_interceptor

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  async: ^2.11.0
  flutter:
    sdk: flutter
  grpc: '>=3.0.0 <5.0.0'
  luciq_flutter: '>=19.0.0 <20.0.0'

dev_dependencies:
  build_runner: ^2.0.3
  flutter_test:
    sdk: flutter
  mockito: ^5.0.10
  pana: ^0.21.0

flutter:
