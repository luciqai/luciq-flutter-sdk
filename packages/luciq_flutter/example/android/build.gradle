buildscript {
    repositories {
        google()
        mavenCentral()
        // Luciq internal Nexus — hosts SNAPSHOT builds of the Android Gradle
        // plugin. Keep credentials OUT of VCS before committing: move them
        // to ~/.gradle/gradle.properties as luciqNexusUsername /
        // luciqNexusPassword and read them via project.findProperty(...).
        maven { url "https://central.sonatype.com/repository/maven-snapshots/" }
    }
    dependencies {
        classpath 'ai.luciq.library:luciq-plugin:19.7.0'
    }
}

rootProject.buildDir = '../build'

//android {
//    namespace 'ai.luciq.flutter.example'
//}
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
    tasks.withType(Test) {
        // Prevent tests in moduleA from running
        if (project.name == 'video_player_android') {
            exclude '**/*'
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
