
plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Luciq Gradle plugin — required at build time for WebView tracking bytecode
// instrumentation. Must be applied AFTER the Android plugin.
apply plugin: 'luciq'

luciq {
    // Include the WebView tracking module in the build. The runtime master
    // switch (Luciq.setWebViewMonitoringEnabled) also needs to remain enabled
    // (it is on by default) for WebView tracking to actually run.
    webViewsTrackingEnabled = true
}

android {
    namespace = "ai.luciq.flutter.example"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    testOptions {
        execution "ANDROIDX_TEST_ORCHESTRATOR"
    }

    defaultConfig {
        applicationId "ai.luciq.flutter.example"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 34
        versionCode flutter.versionCode
        versionName flutter.versionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
        testInstrumentationRunner "pl.leancode.patrol.PatrolJUnitRunner"
        testInstrumentationRunnerArguments clearPackageData: "true"
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
        }
    }
    namespace 'ai.luciq.flutter.example'

    configurations.all {
        resolutionStrategy.force 'org.hamcrest:hamcrest-core:1.3'
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.7.20"
    implementation 'com.android.support:multidex:1.0.3'
    implementation 'org.mockito:mockito-core:1.10.19'
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:1.10.19'
    androidTestUtil "androidx.test:orchestrator:1.5.1"
}
